name: CI/CD Pipeline (Bubble Sort)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential dpkg-dev

      - name: Make scripts executable
        run: chmod +x cicd/*.sh

      - name: Build
        run: bash cicd/build.sh

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bubble-sort-binary
          path: bubble-sort
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: bubble-sort-binary

      - name: Make binary executable
        run: chmod +x bubble-sort

      - name: Make scripts executable
        run: chmod +x cicd/*.sh

      - name: Test
        run: bash cicd/test.sh

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential dpkg-dev

      - name: Make scripts executable
        run: chmod +x cicd/*.sh

      - name: Package
        run: bash cicd/package.sh

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: bubble-sort-deb
          path: build/bubble-sort-pkg.deb
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: package
    permissions:
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download deb artifact
        uses: actions/download-artifact@v4
        with:
          name: bubble-sort-deb
          path: artifacts

      - name: Prepare Docker context
        run: |
          cp artifacts/bubble-sort-pkg.deb ./bubble-sort-pkg.deb
          ls -la bubble-sort-pkg.deb

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/bubble-sort
          docker build -t $IMAGE_NAME:latest .
          docker tag $IMAGE_NAME:latest $IMAGE_NAME:${{ github.run_number }}
          # Дополнительно тегаем как bubble-sort для локального запуска
          docker tag $IMAGE_NAME:latest bubble-sort:latest

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/bubble-sort:latest
          docker push ghcr.io/${{ github.repository_owner }}/bubble-sort:${{ github.run_number }}

      - name: Run container with test input
        run: |
          echo -e "5\n3 8 1 4 6" | docker run --rm -i bubble-sort
          if [ $? -eq 0 ]; then
            echo "Container test passed"
          else
            echo "Container test failed"
            exit 1
          fi