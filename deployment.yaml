apiVersion: apps/v1
kind: Deployment
metadata:
  name: bubble-sort-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bubble-sort
  template:
    metadata:
      labels:
        app: bubble-sort
    spec:
      containers:
      - name: bubble-sort
        image: bubble-sort:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
